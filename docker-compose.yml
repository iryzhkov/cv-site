services:
  app:
    build: .
    container_name: cv-site
    ports:
      - "8091:8091"
    environment:
      - PORT=8091
      - OLLAMA_URL=http://192.168.70.130:8080
      - ADMIN_KEY=${ADMIN_KEY:-changeme}
      - N8N_WEBHOOK_URL=http://192.168.70.223:5678/webhook/cv-contact
    volumes:
      - ./data:/app/data
    restart: unless-stopped
