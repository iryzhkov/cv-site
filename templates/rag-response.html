{{define "rag-response"}}
<div class="term-section">
    {{range .Chunks}}
    <div class="term-line dim">[Chunk #{{.Index}} score:{{printf "%.3f" .Score}}] {{.Text}}</div>
    {{end}}
</div>

<div class="term-section">
    <div class="term-line dim">Answer:</div>
    <div class="prose-container cursor-blink" id="rag-response-{{.StreamID}}"></div>
    <div class="chat-meta" id="rag-meta-{{.StreamID}}"></div>
</div>

<script>
(function() {
    const streamID = "{{.StreamID}}";
    const el = document.getElementById("rag-response-" + streamID);
    const metaEl = document.getElementById("rag-meta-" + streamID);
    let raw = "";
    const source = new EventSource("/api/stream?id=" + streamID);
    source.addEventListener("token", function(e) {
        try { raw += JSON.parse(e.data); } catch { raw += e.data; }
        el.innerHTML = marked.parse(raw);
    });
    source.addEventListener("done", function(e) {
        source.close();
        el.classList.remove("cursor-blink");
        el.innerHTML = marked.parse(raw);
        metaEl.innerHTML = e.data;
    });
    source.addEventListener("error", function() { source.close(); el.classList.remove("cursor-blink"); });
})();
</script>
{{end}}
