{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}igor@cv-site{{end}}</title>
    <meta name="description" content="Igor Ryzhkov — Machine Learning Engineer. Interactive AI/ML demos, projects, and portfolio.">
    <link rel="stylesheet" href="/static/style.css?v=2">
    <script src="/static/htmx.min.js"></script>
    <script src="/static/htmx-sse.js"></script>
    <script src="/static/marked.min.js"></script>
    <script defer src="/static/terminal.js?v=2"></script>
</head>
<body hx-boost="true">
    <div id="terminal" class="terminal-window">
        <!-- Title bar -->
        <div class="terminal-titlebar">
            <div class="terminal-dots">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
            </div>
            <span class="terminal-title">igor@cv-site:~/{{block "page-id" .}}home{{end}}</span>
        </div>

        <!-- Tab bar -->
        <nav class="terminal-tabs">
            <a href="/" class="tab">1:home</a>
            <a href="/about" class="tab">2:about</a>
            <a href="/projects" class="tab">3:projects</a>
            <a href="/playground" class="tab">4:play</a>
            <a href="/benchmarks" class="tab">5:bench</a>
        </nav>

        <!-- Content -->
        <main id="terminal-content" class="terminal-content">
            {{template "content" .}}
        </main>

        <!-- Status bar -->
        <div class="terminal-statusbar">
            <span id="status-mode" class="status-mode desktop-only">NORMAL</span>
            <input id="command-input" type="text" class="command-input hidden desktop-only" autocomplete="off" spellcheck="false">
            <span id="status-hints" class="status-hints desktop-only">:help | h/l tabs | j/k scroll | i insert | theme: paper</span>
            <button class="mobile-menu-btn mobile-only" onclick="Terminal.showPalette()">☰ Menu</button>
        </div>
    </div>
</body>
</html>
{{end}}

{{define "gpu-widget"}}
<span id="gpu-status" hx-get="/api/gpu-status" hx-trigger="load, every 5s" hx-swap="innerHTML">[GPU:checking...]</span>
{{end}}
